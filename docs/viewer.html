<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aegis AI Docs Viewer</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22d3ee;
      --accent-2: #38bdf8;
      --border: #374151;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: linear-gradient(180deg, #0b1220 0%, var(--bg) 100%);
      color: var(--text);
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      line-height: 1.65;
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      background: rgba(17, 24, 39, 0.9);
      padding: 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .brand {
      margin: 0 0 14px;
      font-size: 1.05rem;
      color: var(--accent);
    }

    .sidebar a {
      display: block;
      margin: 6px 0;
      color: var(--text);
      text-decoration: none;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid transparent;
      font-size: 0.95rem;
    }

    .sidebar a:hover,
    .sidebar a.active {
      border-color: var(--border);
      background: rgba(31, 41, 55, 0.85);
      color: var(--accent-2);
    }

    .content-wrap {
      padding: 28px 30px 40px;
      max-width: 980px;
      width: 100%;
      margin: 0 auto;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .top .doc-name {
      font-size: 0.95rem;
      color: var(--muted);
    }

    .top a {
      color: var(--accent-2);
      text-decoration: none;
      font-weight: 600;
    }

    .panel {
      background: rgba(17, 24, 39, 0.76);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      overflow-wrap: anywhere;
    }

    .markdown h1,
    .markdown h2,
    .markdown h3,
    .markdown h4 {
      margin-top: 1.25em;
      margin-bottom: 0.5em;
      line-height: 1.3;
    }

    .markdown h1 { font-size: 1.9rem; }
    .markdown h2 { font-size: 1.45rem; }
    .markdown h3 { font-size: 1.2rem; }

    .markdown p,
    .markdown li {
      color: #d1d5db;
    }

    .markdown a {
      color: var(--accent-2);
      text-decoration: none;
    }

    .markdown a:hover { text-decoration: underline; }

    .markdown code {
      background: #0b1220;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.14em 0.35em;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #c7d2fe;
      font-size: 0.92em;
    }

    .markdown pre {
      background: #0b1220;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      overflow-x: auto;
    }

    .markdown pre code {
      border: 0;
      padding: 0;
      background: transparent;
      color: #cbd5e1;
    }

    .error {
      color: #fecaca;
      background: #3f1d1d;
      border: 1px solid #7f1d1d;
      border-radius: 10px;
      padding: 12px;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        height: auto;
        position: static;
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }

      .content-wrap {
        padding: 18px;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <h1 class="brand">Aegis AI Docs</h1>
      <a data-doc="README.md" href="viewer.html?doc=README.md">Docs Home</a>
      <a data-doc="USAGE.md" href="viewer.html?doc=USAGE.md">Usage Guide</a>
      <a data-doc="FULL_DOCUMENTATION.md" href="viewer.html?doc=FULL_DOCUMENTATION.md">Full Documentation</a>
      <a data-doc="ARCHITECTURE.md" href="viewer.html?doc=ARCHITECTURE.md">Architecture</a>
      <a data-doc="ADAPTER_DEVELOPMENT.md" href="viewer.html?doc=ADAPTER_DEVELOPMENT.md">Adapter Development</a>
      <a data-doc="CONTRIBUTING.md" href="viewer.html?doc=CONTRIBUTING.md">Contributing</a>
      <a data-doc="CODE_OF_CONDUCT.md" href="viewer.html?doc=CODE_OF_CONDUCT.md">Code of Conduct</a>
      <hr style="border-color: var(--border); border-width: 1px 0 0; margin: 12px 0;" />
      <a href="index.html">← Documentation Homepage</a>
    </nav>

    <main class="content-wrap">
      <div class="top">
        <div class="doc-name" id="doc-name">Loading…</div>
        <a id="raw-link" href="#">Open raw .md</a>
      </div>
      <article class="panel markdown" id="content"></article>
    </main>
  </div>

  <script>
    const allowedDocs = new Set([
      "README.md",
      "USAGE.md",
      "FULL_DOCUMENTATION.md",
      "ARCHITECTURE.md",
      "ADAPTER_DEVELOPMENT.md",
      "CONTRIBUTING.md",
      "CODE_OF_CONDUCT.md"
    ]);

    const params = new URLSearchParams(window.location.search);
    const requested = params.get("doc") || "README.md";
    const doc = allowedDocs.has(requested) ? requested : "README.md";

    document.getElementById("doc-name").textContent = `Viewing: ${doc}`;
    document.getElementById("raw-link").href = doc;

    for (const link of document.querySelectorAll(".sidebar a[data-doc]")) {
      if (link.dataset.doc === doc) link.classList.add("active");
    }

    marked.setOptions({
      gfm: true,
      breaks: true,
      headerIds: true,
      mangle: false,
    });

    fetch(doc)
      .then((res) => {
        if (!res.ok) throw new Error(`Could not load ${doc}`);
        return res.text();
      })
      .then((md) => {
        document.getElementById("content").innerHTML = marked.parse(md);

        for (const anchor of document.querySelectorAll("#content a[href]")) {
          const href = anchor.getAttribute("href") || "";

          if (href.endsWith(".md") && allowedDocs.has(href)) {
            anchor.setAttribute("href", `viewer.html?doc=${encodeURIComponent(href)}`);
          }
        }
      })
      .catch((err) => {
        document.getElementById("content").innerHTML = `
          <div class="error">
            Failed to render documentation page.<br/>
            ${String(err)}
          </div>
        `;
      });
  </script>
</body>
</html>
